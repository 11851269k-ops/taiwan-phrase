    <div class="progress-wrap">

  <span id="levelText">Lv.1</span>

 <div class="progress" id="progressBar">
  <div class="progress-fill" id="progressFill"></div>
 </div>

  </div>

  </div>

      <h2 id="frontMeaning"></h2>
    </div>

    <div class="card-back">

      <h2 id="backPhrase"></h2>

      <p id="backMeaning"></p>

      <p id="backZhuyin"></p>

      <p id="backPinyin"></p>

    </div>

  </div>


  <button id="flipBtn">
    答えを見る
  </button>


  <button id="nextBtn">
    次のフレーズ

    <button id="saveBtn">
      保存
    </button>

    <button id="masterBtn">
      覚えた
    </button>

    <button id="playBtn">
      再生
    </button>

    <button id="reviewCard">
      復習

  </div>

  </section>

</section>
